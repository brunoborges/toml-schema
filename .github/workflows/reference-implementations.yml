name: Reference implementations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  java:
    name: Java reference implementation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: reference-implementations/java/pom.xml

      - name: Build and test
        run: mvn -B -f reference-implementations/java/pom.xml package

      - name: Validate checked-in example with explicit schema
        run: java -jar reference-implementations/java/target/toml-schema-0.1.0-SNAPSHOT.jar validate config.tosd config.toml

      - name: Validate checked-in example with schema reference
        run: java -jar reference-implementations/java/target/toml-schema-0.1.0-SNAPSHOT.jar validate config.toml

      - name: Validate example schema against self-schema
        run: java -jar reference-implementations/java/target/toml-schema-0.1.0-SNAPSHOT.jar validate toml-schema.tosd config.tosd

      - name: Validate self-schema against itself
        run: java -jar reference-implementations/java/target/toml-schema-0.1.0-SNAPSHOT.jar validate toml-schema.tosd toml-schema.tosd

  go:
    name: Go reference implementation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: reference-implementations/go/go.mod
          cache-dependency-path: reference-implementations/go/go.sum

      - name: Test
        working-directory: reference-implementations/go
        run: go test ./...

      - name: Validate checked-in example with explicit schema
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema validate ../../config.tosd ../../config.toml

      - name: Validate checked-in example with schema reference
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema validate ../../config.toml

      - name: Validate example schema against self-schema
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema validate ../../toml-schema.tosd ../../config.tosd

      - name: Validate self-schema against itself
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema validate ../../toml-schema.tosd ../../toml-schema.tosd

      - name: Extract schema from checked-in example
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema extract ../../config.toml /tmp/config.generated.tosd

      - name: Validate checked-in example with extracted schema
        working-directory: reference-implementations/go
        run: go run ./cmd/toml-schema validate /tmp/config.generated.tosd ../../config.toml

  rust:
    name: Rust reference implementation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            reference-implementations/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('reference-implementations/rust/Cargo.toml') }}

      - name: Test
        working-directory: reference-implementations/rust
        run: cargo test --locked

      - name: Build CLI
        working-directory: reference-implementations/rust
        run: cargo build --locked --release

      - name: Validate checked-in example with explicit schema
        run: reference-implementations/rust/target/release/toml-schema validate config.tosd config.toml

      - name: Validate checked-in example with schema reference
        run: reference-implementations/rust/target/release/toml-schema validate config.toml

      - name: Validate example schema against self-schema
        run: reference-implementations/rust/target/release/toml-schema validate toml-schema.tosd config.tosd

      - name: Validate self-schema against itself
        run: reference-implementations/rust/target/release/toml-schema validate toml-schema.tosd toml-schema.tosd

      - name: Extract schema from checked-in example
        run: reference-implementations/rust/target/release/toml-schema extract config.toml /tmp/config.generated.tosd

      - name: Validate checked-in example with extracted schema
        run: reference-implementations/rust/target/release/toml-schema validate /tmp/config.generated.tosd config.toml
